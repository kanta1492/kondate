<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>献立アシスタント</title>
<style>
  :root {
    --primary: #2D5016;
    --primary-light: #4A7C2B;
    --accent: #E8A838;
    --accent-light: #F5C96A;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --border: rgba(0,0,0,0.08);
    --success: #2D7D46;
    --tag-bg: #EDF4E8;
    --tag-text: #2D5016;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent-light); }
  .header-date {
    font-size: 12px;
    opacity: 0.7;
  }
  .tabs {
    display: flex;
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 0 12px;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* Pages */
  .page { display: none; padding: 20px 16px 100px; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }

  /* Photo Upload Area */
  .upload-zone {
    border: 2px dashed rgba(45,80,22,0.25);
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--tag-bg);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:active { transform: scale(0.98); }
  .upload-zone.has-image {
    border: 2px solid var(--primary);
    padding: 0;
  }
  .upload-zone img {
    width: 100%;
    border-radius: 14px;
    display: block;
    max-height: 260px;
    object-fit: cover;
  }
  .upload-icon {
    width: 56px;
    height: 56px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }
  .upload-icon svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 2; }
  .upload-text { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--text-muted); }
  .upload-change-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  #fileInput { display: none; }

  /* Servings */
  .servings-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .servings-label { font-size: 14px; color: var(--text); flex: 1; }
  .servings-ctrl {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .servings-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    color: var(--primary);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .servings-btn:active { background: var(--tag-bg); }
  .servings-num {
    width: 44px;
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Genre chips */
  .genre-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }
  .genre-chip {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .genre-chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Generate Button */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }
  .btn-primary:active { transform: scale(0.97); background: var(--primary-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-accent {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #1A1A1A;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-accent:active { transform: scale(0.97); }

  /* Loading */
  .loading-area {
    text-align: center;
    padding: 40px 20px;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3.5px solid var(--tag-bg);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--text-muted); }
  .loading-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; opacity: 0.7; }

  /* Recipe Cards */
  .recipe-card {
    background: var(--card);
    border-radius: 18px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }
  .recipe-header {
    padding: 18px 18px 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .recipe-emoji {
    font-size: 40px;
    line-height: 1;
    flex-shrink: 0;
  }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .recipe-genre {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .recipe-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .recipe-meta span { display: flex; align-items: center; gap: 4px; }
  .recipe-body {
    padding: 0 18px 18px;
  }
  .recipe-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .ingredients-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }
  .ingredient-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .ingredient-name { color: var(--text); font-weight: 500; }
  .ingredient-amount { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .steps-list { list-style: none; }
  .step-item {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }
  .step-num {
    width: 26px;
    height: 26px;
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .step-text { font-size: 14px; line-height: 1.65; color: var(--text); }

  .cook-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--primary);
    color: var(--primary);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .cook-btn:active { background: var(--tag-bg); }

  /* Section divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 18px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Photo Log Page */
  .log-upload {
    border: 2px dashed rgba(45,80,22,0.2);
    border-radius: 16px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--tag-bg);
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .log-upload:active { transform: scale(0.98); }
  .log-upload.has-photo {
    border: 2px solid var(--accent);
    padding: 0;
    border-radius: 16px;
    overflow: hidden;
  }
  .log-upload img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    display: block;
  }
  .log-upload-inner { pointer-events: none; }

  .input-field {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    margin-bottom: 12px;
    transition: border-color 0.2s;
    outline: none;
  }
  .input-field:focus { border-color: var(--primary); background: var(--card); }

  textarea.input-field {
    min-height: 90px;
    resize: none;
    line-height: 1.6;
  }

  .rating-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    justify-content: center;
  }
  .star {
    font-size: 32px;
    cursor: pointer;
    transition: transform 0.15s;
    filter: grayscale(1);
    opacity: 0.4;
    line-height: 1;
  }
  .star.active { filter: none; opacity: 1; transform: scale(1.1); }

  /* Log Gallery */
  .log-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .log-item {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .log-item:active { transform: scale(0.97); }
  .log-photo {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }
  .log-photo-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .log-item-info {
    padding: 10px 12px;
  }
  .log-item-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-stars { color: var(--accent); font-size: 11px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 env(safe-area-inset-bottom, 8px);
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    border: none;
    background: transparent;
  }
  .nav-item.active { color: var(--primary); }
  .nav-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-icon svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Modal / detail */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: flex-end;
    max-width: 430px;
    left: 50%;
    transform: translateX(-50%);
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 16px 20px 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-close {
    float: right;
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .modal-dish-photo {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 16px;
    max-height: 240px;
    object-fit: cover;
  }
  .modal-dish-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .modal-dish-stars { color: var(--accent); font-size: 18px; margin-bottom: 8px; }
  .modal-dish-note {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  /* Transition helper */
  .fade-in {
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .tip-text {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    line-height: 1.6;
  }
  .badge-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .badge {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">献立<span>AI</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('home')">📸 食材読取</div>
    <div class="tab" onclick="switchTab('result')">🍽️ 献立提案</div>
    <div class="tab" onclick="switchTab('log')">📔 料理日記</div>
  </div>
</div>

<!-- HOME TAB -->
<div class="page active" id="page-home">
  <div style="height:16px"></div>

  <div class="card">
    <div class="card-title">📷 冷蔵庫の写真</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div class="upload-text">冷蔵庫を撮影する</div>
      <div class="upload-sub">タップしてカメラを起動</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleFridgePhoto(event)">
    <p class="tip-text">※ デモ用にサンプル食材データを使用します</p>
  </div>

  <div class="card">
    <div class="card-title">👨‍👩‍👧 人数設定</div>
    <div class="servings-row">
      <div class="servings-label">何人分を作りますか？</div>
      <div class="servings-ctrl">
        <button class="servings-btn" onclick="changeServings(-1)">−</button>
        <div class="servings-num" id="servingsNum">2</div>
        <button class="servings-btn" onclick="changeServings(1)">＋</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🌍 ジャンル選択</div>
    <div class="genre-row" id="genreRow">
      <div class="genre-chip active" onclick="toggleGenre(this)">なんでも</div>
      <div class="genre-chip" onclick="toggleGenre(this)">和食</div>
      <div class="genre-chip" onclick="toggleGenre(this)">洋食</div>
      <div class="genre-chip" onclick="toggleGenre(this)">中華</div>
      <div class="genre-chip" onclick="toggleGenre(this)">韓国料理</div>
      <div class="genre-chip" onclick="toggleGenre(this)">エスニック</div>
      <div class="genre-chip" onclick="toggleGenre(this)">イタリアン</div>
      <div class="genre-chip" onclick="toggleGenre(this)">時短</div>
      <div class="genre-chip" onclick="toggleGenre(this)">ヘルシー</div>
    </div>
  </div>

  <button class="btn-primary" onclick="generateRecipes()" id="generateBtn">
    <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    AIに献立を考えてもらう
  </button>
</div>

<!-- RESULT TAB -->
<div class="page" id="page-result">
  <div style="height:16px"></div>
  <div id="resultContent">
    <div class="empty-state">
      <div class="empty-icon">🍳</div>
      <div class="empty-text">まだ献立がありません</div>
      <div class="empty-sub">「食材読取」タブから<br>冷蔵庫の写真を撮って<br>献立を生成しましょう！</div>
    </div>
  </div>
</div>

<!-- LOG TAB -->
<div class="page" id="page-log">
  <div style="height:16px"></div>

  <div class="card">
    <div class="card-title">📝 今日の料理を記録</div>
    <div class="log-upload" id="logUploadZone" onclick="document.getElementById('logPhotoInput').click()">
      <div class="log-upload-inner" id="logUploadInner">
        <div style="font-size:42px;margin-bottom:12px">📸</div>
        <div style="font-size:15px;font-weight:600;color:var(--primary)">完成した料理を撮影</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">タップしてカメラを起動</div>
      </div>
    </div>
    <input type="file" id="logPhotoInput" accept="image/*" capture="environment" onchange="handleLogPhoto(event)" style="display:none">

    <input class="input-field" type="text" id="dishName" placeholder="料理名（例：豚肉の生姜焼き）" maxlength="40">

    <div style="margin-bottom:10px;font-size:13px;color:var(--text-muted);font-weight:600">満足度</div>
    <div class="rating-row" id="ratingRow">
      <span class="star" onclick="setRating(1)">⭐</span>
      <span class="star" onclick="setRating(2)">⭐</span>
      <span class="star" onclick="setRating(3)">⭐</span>
      <span class="star" onclick="setRating(4)">⭐</span>
      <span class="star" onclick="setRating(5)">⭐</span>
    </div>

    <textarea class="input-field" id="dishNote" placeholder="メモ（味の感想、次回の改善点など…）" rows="3"></textarea>

    <button class="btn-accent" onclick="saveLog()">
      <svg width="18" height="18" fill="none" stroke="#1A1A1A" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      日記に保存する
    </button>
  </div>

  <div style="margin-top:4px">
    <div class="card-title" style="padding:0 4px;margin-bottom:12px">🗓️ 料理の記録</div>
    <div class="log-grid" id="logGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📖</div>
        <div class="empty-text">記録がありません</div>
        <div class="empty-sub">作った料理を保存して<br>料理日記を作りましょう！</div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-sheet" id="detailSheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
  // State
  let servings = 2;
  let selectedGenre = 'なんでも';
  let fridgePhotoData = null;
  let logPhotoData = null;
  let logRating = 0;
  let cookingLogs = JSON.parse(localStorage.getItem('cookingLogs') || '[]');
  let currentTab = 'home';

  // Set date
  const now = new Date();
  document.getElementById('headerDate').textContent = `${now.getMonth()+1}月${now.getDate()}日（${'日月火水木金土'[now.getDay()]}）`;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['home','result','log'][i] === tab);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    currentTab = tab;
    if (tab === 'log') renderLogs();
  }

  function changeServings(d) {
    servings = Math.max(1, Math.min(10, servings + d));
    document.getElementById('servingsNum').textContent = servings;
  }

  function toggleGenre(el) {
    document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedGenre = el.textContent;
  }

  function handleFridgePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      fridgePhotoData = ev.target.result;
      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      zone.innerHTML = `<img src="${fridgePhotoData}" alt="冷蔵庫"><button class="upload-change-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">📷 撮り直す</button>`;
    };
    reader.readAsDataURL(file);
  }

  function handleLogPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      logPhotoData = ev.target.result;
      const zone = document.getElementById('logUploadZone');
      zone.classList.add('has-photo');
      zone.innerHTML = `<img src="${logPhotoData}" alt="完成した料理" style="width:100%;max-height:220px;object-fit:cover;display:block"><button style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer" onclick="event.stopPropagation();document.getElementById('logPhotoInput').click()">📷 撮り直す</button>`;
      zone.style.position = 'relative';
    };
    reader.readAsDataURL(file);
  }

  function setRating(n) {
    logRating = n;
    document.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < n);
    });
  }

  async function generateRecipes() {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;

    switchTab('result');

    document.getElementById('resultContent').innerHTML = `
      <div class="loading-area fade-in">
        <div class="spinner"></div>
        <div class="loading-text">食材を分析中...</div>
        <div class="loading-sub">AIが最適な献立を考えています</div>
      </div>
    `;

    // Detected ingredients (demo)
    const sampleIngredients = [
      '豚バラ肉', '鶏むね肉', 'キャベツ', '玉ねぎ', 'にんじん',
      'じゃがいも', '卵', '豆腐', 'ねぎ', '生姜', 'にんにく',
      'トマト', 'ほうれん草', '牛乳', 'チーズ'
    ];

    const genreText = selectedGenre === 'なんでも' ? '和食・洋食・中華・韓国料理などバランスよく' : selectedGenre;

    const prompt = `あなたはプロの料理家AIです。冷蔵庫に以下の食材があります：${sampleIngredients.join('、')}

${servings}人分で作れる献立を3品提案してください。
ジャンル条件：${genreText}

必ずJSON形式のみで返答してください（説明文、コードブロック、マークダウンは不要）：
[
  {
    "name": "料理名",
    "emoji": "料理に合う絵文字1文字",
    "genre": "ジャンル",
    "time": "調理時間（例：20分）",
    "difficulty": "難易度（簡単/普通/本格）",
    "description": "料理の説明（2文）",
    "ingredients": [
      {"name": "食材名", "amount": "${servings}人分の量"}
    ],
    "steps": ["手順1", "手順2", "手順3", "手順4", "手順5"]
  }
]`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, '').trim();
      const recipes = JSON.parse(clean);

      renderRecipes(recipes, sampleIngredients);
    } catch(e) {
      // Fallback demo data
      const fallback = [
        {
          name: "豚バラキャベツの生姜炒め",
          emoji: "🥘",
          genre: "和食",
          time: "15分",
          difficulty: "簡単",
          description: "豚バラとキャベツをたっぷりの生姜で炒めた、ごはんが進む一品。シャキシャキ食感がたまりません。",
          ingredients: [
            {name:"豚バラ肉", amount:`${servings*150}g`},
            {name:"キャベツ", amount:`${servings*2}枚`},
            {name:"生姜", amount:"1かけ"},
            {name:"醤油", amount:"大さじ2"},
            {name:"みりん", amount:"大さじ1"},
            {name:"ごま油", amount:"小さじ1"}
          ],
          steps:[
            "豚バラ肉は3cm幅に切り、キャベツはざく切りにします。生姜は千切りにします。",
            "フライパンにごま油を熱し、生姜を炒めて香りを出します。",
            "豚バラ肉を加えて色が変わるまで炒め、余分な脂を拭き取ります。",
            "キャベツを加えてしんなりするまで炒め合わせます。",
            "醤油・みりんを加えて全体に味が馴染んだら完成です。"
          ]
        },
        {
          name: "鶏むね肉のクリームシチュー",
          emoji: "🍲",
          genre: "洋食",
          time: "35分",
          difficulty: "普通",
          description: "鶏むね肉と野菜をじっくり煮込んだ濃厚クリームシチュー。牛乳とチーズでコクをプラス。",
          ingredients: [
            {name:"鶏むね肉", amount:`${servings*200}g`},
            {name:"じゃがいも", amount:`${servings}個`},
            {name:"にんじん", amount:`${Math.ceil(servings/2)}本`},
            {name:"玉ねぎ", amount:`${servings}個`},
            {name:"牛乳", amount:`${servings*150}ml`},
            {name:"チーズ", amount:"適量"}
          ],
          steps:[
            "鶏むね肉は一口大に切り、野菜もひと口大に切ります。",
            "鍋にバターを溶かし、玉ねぎをしんなりするまで炒めます。",
            "鶏肉を加えて表面が白くなったら残りの野菜を加えます。",
            "水とコンソメを加え、野菜が柔らかくなるまで20分煮ます。",
            "牛乳とシチュールーを加えてとろみがつくまで煮て、チーズをのせて完成。"
          ]
        },
        {
          name: "韓国風チャプチェ",
          emoji: "🍜",
          genre: "韓国料理",
          time: "25分",
          difficulty: "普通",
          description: "春雨と野菜・お肉を甘辛く炒め合わせた韓国定番料理。ごま油の香りが食欲をそそります。",
          ingredients: [
            {name:"豚バラ肉", amount:`${servings*100}g`},
            {name:"春雨", amount:`${servings*60}g`},
            {name:"ほうれん草", amount:`${servings}束`},
            {name:"にんじん", amount:"1/2本"},
            {name:"卵", amount:`${servings}個`},
            {name:"ごま油", amount:"大さじ2"}
          ],
          steps:[
            "春雨をお湯で戻し、食べやすい長さに切ります。野菜は細切りにします。",
            "フライパンでごま油を熱し、豚肉を炒めて醤油・砂糖・コチュジャンで味付けします。",
            "にんじん・ほうれん草を加えてサッと炒め合わせます。",
            "水気を切った春雨を加え、全体をよく混ぜ合わせます。",
            "器に盛り、炒り卵をトッピングして完成です。"
          ]
        }
      ];
      renderRecipes(fallback, sampleIngredients);
    }
    btn.disabled = false;
  }

  function renderRecipes(recipes, ingredients) {
    const badgesHtml = ingredients.slice(0, 8).map(i => `<span class="badge">${i}</span>`).join('');

    let html = `
      <div class="card fade-in" style="padding:16px 20px">
        <div class="card-title">🧊 検出された食材</div>
        <div class="badge-row">${badgesHtml}<span class="badge">他${ingredients.length-8}品</span></div>
        <div style="font-size:12px;color:var(--text-muted)">${servings}人分 ／ ジャンル：${selectedGenre}</div>
      </div>
      <div class="divider">AI が ${recipes.length} 品の献立を提案</div>
    `;

    recipes.forEach((r, idx) => {
      const ingHtml = r.ingredients.map(i => `
        <div class="ingredient-item">
          <span class="ingredient-name">${i.name}</span>
          <span class="ingredient-amount">${i.amount}</span>
        </div>
      `).join('');

      const stepsHtml = r.steps.map((s, i) => `
        <li class="step-item">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${s}</div>
        </li>
      `).join('');

      html += `
        <div class="recipe-card fade-in" style="animation-delay:${idx*0.1}s">
          <div class="recipe-header">
            <div class="recipe-emoji">${r.emoji}</div>
            <div class="recipe-info">
              <div class="recipe-genre">${r.genre}</div>
              <div class="recipe-name">${r.name}</div>
              <div class="recipe-meta">
                <span>🕐 ${r.time}</span>
                <span>📊 ${r.difficulty}</span>
                <span>👥 ${servings}人分</span>
              </div>
            </div>
          </div>
          <div class="recipe-body">
            <div class="recipe-desc">${r.description}</div>
            <div class="section-label">材料</div>
            <div class="ingredients-grid">${ingHtml}</div>
            <div class="section-label">作り方</div>
            <ol class="steps-list">${stepsHtml}</ol>
            <button class="cook-btn" onclick="startCooking('${r.name.replace(/'/g,"\\'")}', '${r.emoji}')">
              📔 この料理を日記に記録する
            </button>
          </div>
        </div>
      `;
    });

    document.getElementById('resultContent').innerHTML = html;
  }

  function startCooking(name, emoji) {
    switchTab('log');
    document.getElementById('dishName').value = name;
    window.scrollTo(0, 0);
  }

  function saveLog() {
    const name = document.getElementById('dishName').value.trim();
    if (!name) { alert('料理名を入力してください'); return; }
    if (!logRating) { alert('満足度を選んでください'); return; }

    const log = {
      id: Date.now(),
      name,
      photo: logPhotoData,
      rating: logRating,
      note: document.getElementById('dishNote').value,
      date: new Date().toLocaleDateString('ja-JP', {month:'long', day:'numeric'})
    };

    cookingLogs.unshift(log);
    localStorage.setItem('cookingLogs', JSON.stringify(cookingLogs));

    // Reset
    logPhotoData = null;
    logRating = 0;
    document.getElementById('dishName').value = '';
    document.getElementById('dishNote').value = '';
    document.getElementById('logUploadZone').classList.remove('has-photo');
    document.getElementById('logUploadZone').style.position = '';
    document.getElementById('logUploadZone').innerHTML = `<div class="log-upload-inner"><div style="font-size:42px;margin-bottom:12px">📸</div><div style="font-size:15px;font-weight:600;color:var(--primary)">完成した料理を撮影</div><div style="font-size:13px;color:var(--text-muted);margin-top:4px">タップしてカメラを起動</div></div>`;
    document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));

    renderLogs();
    alert('料理日記に保存しました！✨');
  }

  function renderLogs() {
    const grid = document.getElementById('logGrid');
    if (!cookingLogs.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📖</div><div class="empty-text">記録がありません</div><div class="empty-sub">作った料理を保存して<br>料理日記を作りましょう！</div></div>`;
      return;
    }

    grid.innerHTML = cookingLogs.map(log => `
      <div class="log-item" onclick="showDetail(${log.id})">
        ${log.photo
          ? `<img class="log-photo" src="${log.photo}" alt="${log.name}">`
          : `<div class="log-photo-placeholder">🍽️</div>`
        }
        <div class="log-item-info">
          <div class="log-item-name">${log.name}</div>
          <div class="log-item-meta">
            <span>${log.date}</span>
            <span class="log-stars">${'⭐'.repeat(log.rating)}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function showDetail(id) {
    const log = cookingLogs.find(l => l.id === id);
    if (!log) return;

    document.getElementById('detailContent').innerHTML = `
      ${log.photo ? `<img class="modal-dish-photo" src="${log.photo}" alt="${log.name}">` : `<div style="font-size:60px;text-align:center;margin-bottom:16px">🍽️</div>`}
      <div class="modal-dish-stars">${'⭐'.repeat(log.rating)}</div>
      <div class="modal-dish-name">${log.name}</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${log.date}</div>
      ${log.note ? `<div class="modal-dish-note">${log.note}</div>` : ''}
      <button onclick="deleteLog(${id})" style="width:100%;margin-top:20px;padding:12px;background:transparent;border:1.5px solid #E24B4A;color:#E24B4A;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600">削除する</button>
    `;
    document.getElementById('detailModal').classList.add('open');
  }

  function deleteLog(id) {
    if (!confirm('この記録を削除しますか？')) return;
    cookingLogs = cookingLogs.filter(l => l.id !== id);
    localStorage.setItem('cookingLogs', JSON.stringify(cookingLogs));
    document.getElementById('detailModal').classList.remove('open');
    renderLogs();
  }

  function closeModal(e) {
    if (e.target === document.getElementById('detailModal')) {
      document.getElementById('detailModal').classList.remove('open');
    }
  }

  renderLogs();
</script>
</body>
</html>
